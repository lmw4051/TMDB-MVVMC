name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  swiftlint:
    name: SwiftLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: SwiftLint
        uses: norio-nomura/action-swiftlint@3.2.1
        with:
          args: --strict

  test:
    name: Unit & Integration Tests
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app
      
      - name: Create Secret.xcconfig
        run: |
          echo "TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}" \
          > MovieBrowser/Configuration/Secret.xcconfig
      
      - name: Run Unit & Integration Tests
        run: |
          xcodebuild test \
            -project MovieBrowser.xcodeproj \
            -scheme MovieBrowser \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.2' \
            -only-testing:MovieBrowserTests \
            | xcpretty

  ui-test:
    name: UI Tests
    runs-on: macos-14
    needs: test   # Unit Tests 通過才跑 UI Tests
    steps:
      - uses: actions/checkout@v4
      
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app
      
      - name: Create Secret.xcconfig
        run: |
          echo "TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}" \
          > MovieBrowser/Configuration/Secret.xcconfig
      
      - name: Run UI Tests
        run: |
          xcodebuild test \
            -project MovieBrowser.xcodeproj \
            -scheme MovieBrowser \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.2' \
            -only-testing:MovieBrowserUITests \
            | xcpretty
